<!doctype html>
<html lang="en" data-viz-version="2">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Campaign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <link rel="stylesheet" href="./assets/style.css">
  <link rel="stylesheet" href="./custom.css" onerror="this.remove()">
  <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
  <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
  <script src="https://unpkg.com/marked@15.0.4/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
</head>
<body>
  <main id="app">
    <p class="loading">Loading…</p>
  </main>
  <div id="width-toggle" aria-label="Body width" title="Cycle body width (narrow · standard · wide)"></div>
  <script>
    // Width toggle. Cycles the body measure between three presets, persisted
    // in localStorage. Sets data-width on <html>; custom.css picks it up.
    (function () {
      const STEPS = ['narrow', 'standard', 'wide'];
      const LABELS = { narrow: '◧ narrow', standard: '◨ standard', wide: '▭ wide' };
      const root = document.documentElement;
      const btn = document.getElementById('width-toggle');
      let i = Math.max(0, STEPS.indexOf(localStorage.getItem('ke-width') || 'standard'));
      function apply() {
        const step = STEPS[i];
        root.setAttribute('data-width', step);
        btn.textContent = LABELS[step];
        localStorage.setItem('ke-width', step);
      }
      btn.addEventListener('click', () => { i = (i + 1) % STEPS.length; apply(); });
      apply();
    })();
  </script>
  <script type="module" src="./assets/app.js"></script>
  <script>
    // KaTeX auto-render over the SPA. app.js rewrites #app via innerHTML, so
    // we observe the container and retypeset math when its subtree changes.
    // The observer disconnects during typeset so KaTeX's own DOM insertions
    // don't re-trigger the observer (would otherwise infinite-loop).
    (function () {
      const app = document.getElementById('app');
      const opts = {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '\\[', right: '\\]', display: true },
          { left: '$',  right: '$',  display: false },
          { left: '\\(', right: '\\)', display: false }
        ],
        throwOnError: false,
        ignoredTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code', 'option']
      };
      let queued = false;
      const obs = new MutationObserver(schedule);
      function typeset() {
        queued = false;
        if (!window.renderMathInElement) { setTimeout(schedule, 50); return; }
        obs.disconnect();
        try { window.renderMathInElement(app, opts); } catch (_) {}
        obs.observe(app, { childList: true, subtree: true });
      }
      function schedule() {
        if (queued) return;
        queued = true;
        requestAnimationFrame(typeset);
      }
      obs.observe(app, { childList: true, subtree: true });
      window.addEventListener('load', schedule);
    })();
  </script>
</body>
</html>
